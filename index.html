<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
    rel="stylesheet">
  <link 
    rel="stylesheet"
    href="style.css"
    media="screen"
    charset="utf-8">
</head>
<body class="page">
  <header class="header">
    <img 
      src="./eisenhower-matrix.jpg"
      class="header__image"
      alt="Eisenhower Matrix diagram">
    <a
      class="header__link"
      href="https://goal-life.com/page/method/matrix-eisenhower"
    >
      Want more details?
    </a>
  </header>
  <section class="board">
    <div class="new-task">
      <label 
        for="new-task"
        class="new-task__label">
        Add Item
      </label>
      <div class="new-task__input-container">
        <input 
          id="new-task"
          class="input task-label task-input"
          type="text">
        <button 
          class="button"
          aria-label="Add task">
          Add</button>
      </div>
    </div>
    <h3 class="board__title">Todo</h3>
    <ul 
      id="incomplete-tasks"
      class="tasks-list"
      aria-live="polite">
      <li class="tasks-list__item">
        <input 
          class="input task-checkbox"
          type="checkbox">
        <label class="task-label">Pay Bills</label>
        <input 
          type="text"
          class="input task-label task-input">
        <button 
          class="button edit"
          aria-label="Edit task">
          Edit</button>
        <button 
          class="button delete"
          aria-label="Delete task">
          <img 
            src="./remove.svg"
            class="button__image"
            alt="delete button">
        </button>
      </li>
      <li class="edit-text tasks-list__item">
        <input 
          class="input task-checkbox"
          type="checkbox">
        <label class="task-label">Go Shopping</label>
        <input 
          type="text"
          value="Go Shopping"
          class="input task-label task-input">
        <button 
          class="button edit"
          aria-label="Edit task">
          Save</button>
        <button 
          class="button delete"
          aria-label="Delete task">
          <img 
            src="./remove.svg"
            class="button__image"
            alt="delete button">
        </button>
      </li>
    </ul>
    <h3 class="board__title">Completed</h3>
    <ul 
      id="completed-tasks"
      class="tasks-list"
      aria-live="polite">
      <li class="tasks-list__item">
        <input 
          class="input task-checkbox"
          type="checkbox"
          checked>
        <label class="task-label">See the Doctor</label>
        <input 
          type="text"
          class="input task-label task-input">
        <button 
          class="button edit"
          aria-label="Edit task">Edit</button>
        <button 
          class="button delete"
          aria-label="Delete task">
          <img 
            src="./remove.svg"
            class="button__image">
        </button>
      </li>
    </ul>
  </section>
<script src="app.js"></script>
</body>
</html>
