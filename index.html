<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
    rel="stylesheet">
  <link 
    rel="stylesheet"
    href="style.css"
    media="screen"
    charset="utf-8">
</head>
<body class="page">
  <div class="header">
    <img src="./eisenhower-matrix.jpg" class="header__image">
    <a
      class="header__link"
      href="https://goal-life.com/page/method/matrix-eisenhower"
    >
      Want more details?
    </a>
  </div>
  <div class="board">
    <p id="new-task__title">
      <label 
        for="new-task"
        class="new-task__label">
        Add Item
      </label>
      <div class="new-task__input-container">
        <input 
          id="new-task"
          class="input task task-input"
          type="text">
        <button class="button">Add</button>
      </div>
    </p>
    <h3 class="section-title incomplite-task__title">Todo</h3>
    <ul 
      id="incomplete-tasks"
      class="list">
      <li class="list__point">
        <input 
          class="input task-checkbox"
          type="checkbox">
        <label class="task">Pay Bills</label>
        <input 
          type="text"
          class="input task task-input">
        <button class="button edit">Edit</button>
        <button class="button delete">
          <img src="./remove.svg" class="button__image">
        </button>
      </li>
      <li class="edit-text list__point">
        <input 
          class="input task-checkbox"
          type="checkbox">
        <label class="task">Go Shopping</label>
        <input 
          type="text"
          value="Go Shopping"
          class="input task task-input">
        <button class="button edit">Save</button>
        <button class="button delete">
          <img 
            src="./remove.svg"
            class="button__image">
        </button>
      </li>
    </ul>
    <h3 class="section-title complite-task__title">Completed</h3>
    <ul 
      id="completed-tasks"
      class="list">
      <li class="list__point">
        <input 
          class="input task-checkbox"
          type="checkbox"
          checked>
        <label class="task">See the Doctor</label>
        <input 
          type="text"
          class="input task task-input">
        <button class="button edit">Edit</button>
        <button class="button delete">
          <img 
            src="./remove.svg"
            class="button__image">
        </button>
      </li>
    </ul>
  </div>
<script src="app.js"></script>
</body>
</html>
